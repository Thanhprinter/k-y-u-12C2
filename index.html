<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ Yếu Lớp 12 - Rực Rỡ Thanh Xuân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; }
        .font-handwriting { font-family: 'Pacifico', cursive; }
        
        /* Hiệu ứng nền chuyển động */
        .animated-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="animated-bg text-white py-12 md:py-20 px-4 text-center shadow-lg">
        <h1 class="text-4xl md:text-7xl font-bold mb-4 drop-shadow-md">Tổ Của Chúng Ta</h1>
        <p class="font-handwriting text-xl md:text-3xl opacity-90">Thanh xuân rực rỡ</p>
    </header>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-pink-100 p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-around font-semibold text-pink-600 text-sm md:text-base">
            <button onclick="document.getElementById('content-frame').src='home.html'" class="hover:scale-110 transition focus:outline-none">🏠 Home</button>
            <button onclick="document.getElementById('content-frame').src='thanhvien.html'" class="hover:scale-110 transition focus:outline-none">👥 Members</button>
            <button onclick="document.getElementById('content-frame').src='gallery.html'" class="hover:scale-110 transition focus:outline-none">📸 Gallery</button>
            <a href="#dev" class="hover:scale-110 transition">💌 Dev</a>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:p-6 flex justify-center">
        <iframe 
            id="content-frame" 
            src="home.html" 
            class="w-full h-[800px] border-none rounded-3xl bg-transparent transition-all duration-300">
        </iframe>
    </main>

    <footer id="dev" class="bg-white border-t-4 border-indigo-500 py-12 text-center mt-auto">
        <div class="max-w-md mx-auto px-6">
            <div class="bg-indigo-600 text-white p-4 rounded-full inline-block mb-4 shadow-lg">
                <span class="text-2xl">👨‍💻</span>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2 italic">Người xây tổ ấm này</h3>
            <p class="text-gray-500 mb-6 font-medium">Bản quyền thuộc về Thanhpahm - Một thành viên của Tổ.</p>
            <div class="flex justify-center gap-6">
                <a href="https://www.facebook.com/vietthanh.pham.3994885/" target="_blank" class="text-pink-500 font-bold hover:underline">Facebook</a>
                <a href="#" class="text-indigo-500 font-bold hover:underline">Tiktok</a>
            </div>
        </div>
    </footer>

</body>
</html>
